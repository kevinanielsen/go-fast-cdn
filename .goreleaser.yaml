version: 2

project_name: go-fast-cdn

dist: .dist

before:
  hooks:
    - go mod tidy

builds:
  - id: linux-amd64
    binary: go-fast-cdn
    env:
      - CGO_ENABLED=1
      - CC=x86_64-linux-gnu-gcc
      - CXX=x86_64-linux-gnu-g++
    goos:
      - linux
    goarch:
      - amd64
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}} -X main.builtBy=goreleaser

  - id: linux-arm64
    binary: go-fast-cdn
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
      - CXX=aarch64-linux-gnu-g++
    goos:
      - linux
    goarch:
      - arm64
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}} -X main.builtBy=goreleaser

  - id: linux-armv7
    binary: go-fast-cdn
    env:
      - CGO_ENABLED=1
      - CC=arm-linux-gnueabihf-gcc
      - CXX=arm-linux-gnueabihf-g++
    goos:
      - linux
    goarch:
      - arm
    goarm:
      - 7
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}} -X main.builtBy=goreleaser

  - id: darwin-amd64
    binary: go-fast-cdn
    env:
      - CGO_ENABLED=1
      - CC=o64-clang
      - CXX=o64-clang++
    goos:
      - darwin
    goarch:
      - amd64
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}} -X main.builtBy=goreleaser

  - id: darwin-arm64
    binary: go-fast-cdn
    env:
      - CGO_ENABLED=1
      - CC=oa64-clang
      - CXX=oa64-clang++
    goos:
      - darwin
    goarch:
      - arm64
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}} -X main.builtBy=goreleaser

  - id: windows-amd64
    binary: go-fast-cdn
    env:
      - CGO_ENABLED=1
      - CC=x86_64-w64-mingw32-gcc
      - CXX=x86_64-w64-mingw32-g++
    goos:
      - windows
    goarch:
      - amd64
    mod_timestamp: '{{ .CommitTimestamp }}'
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}} -X main.builtBy=goreleaser

archives:
  - id: linux-amd64
    builds:
      - linux-amd64
    name_template: "{{ .ProjectName }}_{{ .Version }}_linux_amd64"
    format: zip
    files:
      - LICENSE*
      - README*

  - id: linux-arm64
    builds:
      - linux-arm64
    name_template: "{{ .ProjectName }}_{{ .Version }}_linux_arm64"
    format: zip
    files:
      - LICENSE*
      - README*

  - id: linux-armv7
    builds:
      - linux-armv7
    name_template: "{{ .ProjectName }}_{{ .Version }}_linux_armv7"
    format: zip
    files:
      - LICENSE*
      - README*

  - id: darwin-amd64
    builds:
      - darwin-amd64
    name_template: "{{ .ProjectName }}_{{ .Version }}_darwin_amd64"
    format: zip
    files:
      - LICENSE*
      - README*

  - id: darwin-arm64
    builds:
      - darwin-arm64
    name_template: "{{ .ProjectName }}_{{ .Version }}_darwin_arm64"
    format: zip
    files:
      - LICENSE*
      - README*

  - id: windows-amd64
    builds:
      - windows-amd64
    name_template: "{{ .ProjectName }}_{{ .Version }}_windows_amd64"
    format: zip
    files:
      - LICENSE*
      - README*

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"

release:
  target_commitish: '{{ .Commit }}'
  draft: true
  github:
    owner: kevinanielsen
    name: go-fast-cdn

changelog:
  sort: asc
  use: git
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore"
      - "merge conflict"
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
      - go mod tidy

metadata:
  mod_timestamp: '{{ .CommitTimestamp }}'