# Nginx configuration example for subdomain separation
# Admin UI: admin.cdn.example.com
# Public CDN: cdn.example.com

# Admin subdomain - serves UI and all API endpoints
server {
    listen 80;
    server_name admin.cdn.example.com;

    location / {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Public CDN subdomain - serves only public files and read-only API
server {
    listen 80;
    server_name cdn.example.com;

    # Allow only public CDN endpoints
    location /api/cdn/images/ {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/cdn/docs/ {
        proxy_pass http://localhost:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Block everything else
    location / {
        return 403;
    }
}
